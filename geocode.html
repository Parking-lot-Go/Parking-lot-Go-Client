let results = [];

async function run() {
  const status = document.getElementById('status');
  const resultEl = document.getElementById('result');
  results = [];
  resultEl.textContent = '';

  await new Promise(resolve => {
    kakao.maps.load(resolve);
  });

  const gc = new kakao.maps.services.Geocoder();
  const total = addresses.length;
  let done = 0;
  let failed = 0;

  for (let i = 0; i < total; i++) {
    const addr = addresses[i];
    status.textContent = `변환 중... ${i + 1} / ${total}`;

    try {
      const result = await new Promise((resolve) => {
        gc.addressSearch('서울특별시 ' + addr, (res, s) => {
          if (s === kakao.maps.services.Status.OK && res.length > 0) {
            resolve({ addr, lat: res[0].y, lng: res[0].x });
          } else {
            resolve(null);
          }
        });
      });

      if (result) {
        results.push(result);
      } else {
        results.push({ addr, lat: 'FAIL', lng: 'FAIL' });
        failed++;
      }
    } catch (e) {
      results.push({ addr, lat: 'ERROR', lng: 'ERROR' });
      failed++;
    }

    // API rate limit 방지
    await new Promise(r => setTimeout(r, 120));
  }

  // TSV 출력
  let tsv = 'address\tlat\tlng\n';
  results.forEach(r => {
    tsv += `${r.addr}\t${r.lat}\t${r.lng}\n`;
  });

  resultEl.textContent = tsv;
  status.textContent = `완료! 성공: ${total - failed} / 실패: ${failed}`;
  document.getElementById('copyBtn').disabled = false;
  document.getElementById('copySql').disabled = false;
}

function copyResult() {
  let tsv = 'address\tlat\tlng\n';
  results.forEach(r => {
    tsv += `${r.addr}\t${r.lat}\t${r.lng}\n`;
  });
  navigator.clipboard.writeText(tsv).then(() => alert('TSV 복사 완료! DataGrip에 붙여넣기 하세요.'));
}

function copySql() {
  const rows = results.filter(r => r.lat !== 'FAIL' && r.lat !== 'ERROR');
  let sql = 'INSERT INTO parking_lot (address, lat, lng) VALUES\n';
  sql += rows.map(r => `  ('서울특별시 ${r.addr}', ${r.lat}, ${r.lng})`).join(',\n');
  sql += ';\n';
  navigator.clipboard.writeText(sql).then(() => alert('SQL INSERT 복사 완료!'));
}
